<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六格翻牌小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }

        .game-title {
            font-size: 28px;
            color: #d32f2f;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            width: 120px;
            height: 120px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: #d32f2f;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            transform: rotateY(180deg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #d32f2f;
            color: white;
            font-weight: bold;
            transition: background 0.3s;
            margin:5px;
        }

        .btn:hover {
            background: #b71c1c;
        }

        #resetBtn {
            display: none;
            margin-top: 10px;
        }

        #adminBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            font-size: 14px;
        }

        #shareBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding:10px 20px;
            background:#2f8bfd;
        }
        #shareBtn:hover{
            background:#1a73e8;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }

        #enlargeModal .modal-content {
            max-width: 90%;
            max-height: 90vh;
            background: transparent;
            padding: 0;
        }

        #enlargeImg {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .scan-tip {
            color: white;
            margin-top: 15px;
            font-size: 16px;
        }

        .success-tip {
            color: #4caf50;
            font-size: 18px;
            margin: 15px 0;
            font-weight: bold;
            display: none;
        }

        .share-link{
            padding:10px;
            background:#f5f5f5;
            border-radius:6px;
            word-break:break-all;
            margin:15px 0;
            color:#333;
        }

        .file-input{
            padding:5px;
            margin:8px 0;
        }
    </style>
</head>
<body>
    <h1 class="game-title">六格翻牌小游戏</h1>

    <div class="card-container">
        <div class="card" data-index="0"><div class="card-inner"><div class="card-front">1</div><div class="card-back"><img src="" alt="背面"></div></div></div>
        <div class="card" data-index="1"><div class="card-inner"><div class="card-front">2</div><div class="card-back"><img src="" alt="背面"></div></div></div>
        <div class="card" data-index="2"><div class="card-inner"><div class="card-front">3</div><div class="card-back"><img src="" alt="背面"></div></div></div>
        <div class="card" data-index="3"><div class="card-inner"><div class="card-front">4</div><div class="card-back"><img src="" alt="背面"></div></div></div>
        <div class="card" data-index="4"><div class="card-inner"><div class="card-front">5</div><div class="card-back"><img src="" alt="背面"></div></div></div>
        <div class="card" data-index="5"><div class="card-inner"><div class="card-front">6</div><div class="card-back"><img src="" alt="背面"></div></div></div>
    </div>

    <button id="resetBtn" class="btn">重新开始游戏</button>
    <button id="adminBtn" class="btn">管理后台</button>
    <button id="shareBtn" class="btn">分享游戏</button>

    <div id="pwdModal" class="modal">
        <div class="modal-content">
            <h2>后台登录</h2>
            <input type="password" id="adminPwd" placeholder="请输入后台密码（默认：123456）">
            <button class="btn" onclick="checkPwd()">登录</button>
        </div>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h2>上传本地图片（别人打开也显示）</h2>
            <p>直接上传电脑/手机里的图片：</p>
            
            第1张：<input type="file" class="file-input" id="file1" accept="image/*"><br>
            第2张：<input type="file" class="file-input" id="file2" accept="image/*"><br>
            第3张：<input type="file" class="file-input" id="file3" accept="image/*"><br>
            第4张：<input type="file" class="file-input" id="file4" accept="image/*"><br>
            第5张：<input type="file" class="file-input" id="file5" accept="image/*"><br>
            第6张：<input type="file" class="file-input" id="file6" accept="image/*"><br>

            <div class="success-tip" id="successTip">上传成功！</div>
            <button class="btn" onclick="saveLocalImages()" style="margin-top:15px">确定保存</button>
            <button class="btn" onclick="closeAdmin()" style="margin-left:10px; background:#666;">返回游戏</button>
        </div>
    </div>

    <div id="enlargeModal" class="modal">
        <div class="modal-content">
            <img id="enlargeImg" src="">
            <p class="scan-tip">长按可微信扫一扫识别图片</p>
        </div>
    </div>

    <div id="shareModal" class="modal">
        <div class="modal-content">
            <h2>分享游戏给好友</h2>
            <p>复制链接分享，图片永久显示！</p>
            <div class="share-link" id="shareLink"></div>
            <button class="btn" onclick="copyShareLink()">复制链接</button>
            <button class="btn" onclick="closeShare()" style="background:#666;">关闭</button>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "123456";
        let cardImages = ["", "", "", "", "", ""];
        let flipCount = 0;

        window.onload = function(){
            let local = localStorage.getItem("cardImages");
            if(local) cardImages = JSON.parse(local);
            updateAllCards();
            document.getElementById("shareLink").innerText = window.location.href;
        }

        function updateAllCards(){
            let imgs = document.querySelectorAll('.card-back img');
            for(let i=0;i<6;i++){
                if(cardImages[i]) imgs[i].src = cardImages[i];
            }
        }

        document.getElementById('adminBtn').onclick = function() {
            document.getElementById('pwdModal').style.display = 'flex';
        }

        function checkPwd() {
            if (document.getElementById('adminPwd').value === ADMIN_PASSWORD) {
                document.getElementById('pwdModal').style.display = 'none';
                document.getElementById('uploadModal').style.display = 'flex';
            } else alert('密码错误！');
        }

        // ==============================================
        // 核心：本地上传图片 → 直接转代码保存（终极功能）
        // ==============================================
        function saveLocalImages(){
            let count = 0;
            let total = 6;

            for(let i=1;i<=6;i++){
                let fileInput = document.getElementById(`file${i}`);
                if(!fileInput.files[0]){
                    count++;
                    if(count === total) done();
                    continue;
                }

                let reader = new FileReader();
                reader.onload = (e) => {
                    cardImages[i-1] = e.target.result;
                    count++;
                    if(count === total) done();
                };
                reader.readAsDataURL(fileInput.files[0]);
            }
        }

        function done(){
            updateAllCards();
            localStorage.setItem("cardImages", JSON.stringify(cardImages));
            let tip = document.getElementById('successTip');
            tip.style.display = 'block';
            setTimeout(() => {
                tip.style.display = 'none';
                closeAdmin();
            }, 1600);
        }

        function closeAdmin() {
            document.getElementById('uploadModal').style.display = 'none';
            document.getElementById('pwdModal').style.display = 'none';
        }

        // 翻牌
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.onclick = function() {
                if (this.classList.contains('flipped') || !cardImages[this.dataset.index]) return;
                this.classList.add('flipped');
                flipCount++;
                if (flipCount === 6) document.getElementById('resetBtn').style.display = 'block';
            }
        });

        // 放大图片
        document.querySelectorAll('.card-back img').forEach(img => {
            img.onclick = function(e) {
                e.stopPropagation();
                document.getElementById('enlargeImg').src = this.src;
                document.getElementById('enlargeModal').style.display = 'flex';
            }
        });

        document.getElementById('enlargeModal').onclick = function() {
            this.style.display = 'none';
        }

        // 重置
        document.getElementById('resetBtn').onclick = function() {
            cards.forEach(card => card.classList.remove('flipped'));
            flipCount = 0;
            this.style.display = 'none';
        }

        // 分享
        document.getElementById('shareBtn').onclick = function(){
            document.getElementById('shareModal').style.display = "flex";
        }

        function closeShare(){
            document.getElementById('shareModal').style.display = "none";
        }

        function copyShareLink(){
            navigator.clipboard.writeText(window.location.href).then(()=>{
                alert("复制成功！分享后图片100%显示");
            }).catch(()=>alert("复制失败，请手动复制"));
        }
    </script>
</body>
</html>
